<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>FlashChat ⚡</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}
button,input{font-family:inherit;border:none;outline:none;}
.scr{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;background:#000;}
.scr.on{display:flex;}
#s-auth{align-items:center;justify-content:center;padding:32px 24px 44px;

.auth-tabs{display:flex;width:100%;background:#111;border-radius:14px;padding:4px;margin-bottom:14px;gap:4px;}

.divider{color:#222;font-size:.78rem;margin:9px 0;text-align:center;}

.btn-d:active{background:#1a1a1a;}

#s-chat{background:#000;}

.clist{flex:1;overflow-y:auto;padding-bottom:86px;}
.clist::-webkit-scrollbar{display:none;}
.ci{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;}

.av-dot.on{background:#00D26A;}.av-dot.off{background:#333;}
.ci-info{flex:1;min-width:0;}

.nbadge.r{background:#FF3B3B;}.nbadge.g{background:#1a1a1a;color:#444;}
#s-convo{background:#000;display:none;-webkit-flex-direction:column;flex-direction:column;position:absolute;inset:0;overflow:hidden;}
#s-convo.on{display:-webkit-flex;display:flex;}
.cbar{padding:50px 14px 10px;display:flex;align-items:center;gap:9px;flex-shrink:0;border-bottom:1px solid #111;}
.bkbtn{width:36px;height:36px;border-radius:50%;background:#111;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.cname{font-weight:800;font-size:.9rem;}
.cstatus{font-size:.72rem;color:#00D26A;font-weight:600;}
.cacts{display:flex;gap:6px;margin-left:auto;}

.msgs::-webkit-scrollbar{display:none;}

.mrow{display:flex;align-items:flex-end;gap:6px;}
.mrow.me{flex-direction:row-reverse;}

.mav img{width:100%;height:100%;object-fit:cover;}

.btm{font-size:.62rem;color:#333;margin:1px 5px 3px;}
.btm.me{text-align:right;}

@keyframes tda{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.ibar{
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;

  width:100%;
}

  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  -webkit-flex-shrink:0;flex-shrink:0;
  border:none;
}
.imbtn:active{background:#252525;}
.minp{
  -webkit-flex:1;flex:1;

  padding:11px 16px;color:#fff;

  min-width:0;border:none;outline:none;

  -webkit-justify-content:center;justify-content:center;
  -webkit-flex-shrink:0;flex-shrink:0;

  transition:all .12s;

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════
   FLASH ⚡  lulump5.github.io/Flashchat/
   Firebase Realtime Database — tous les utilisateurs inscrits
   sont automatiquement visibles par tous.
   Structure :
     /accounts/{handle} → { name, handle, pwh, pic, lastSeen }
═══════════════════════════════════════════════════════════════ */

const DB = 'https://flashchat-4236d-default-rtdb.europe-west1.firebasedatabase.app';

async function fbGet(p) {
  try { const r=await fetch(`${DB}/${p}.json`); return r.ok?await r.json():null; }
  catch { return null; }
}
async function fbSet(p,d) {
  try { await fetch(`${DB}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); }
  catch(e){console.error(e);}
}
async function fbPatch(p,d) {
  try { await fetch(`${DB}/${p}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); }
  catch(e){console.error(e);}
}

function hashPw(pw) { let h=5381; for(let i=0;i<pw.length;i++) h=((h<<5)+h)^pw.charCodeAt(i); return (h>>>0).toString(36); }
function loadLocal(h) { try{return JSON.parse(localStorage.getItem('fl_'+h)||'null');}catch{return null;} }
function saveLocal(h,d) { try{localStorage.setItem('fl_'+h,JSON.stringify(d));}catch{} }

let ME=null, USERS={}, MSGS={};
const S={screen:'chat',convoId:null,camStream:null,facing:'environment',capturedPhoto:null,recentSnaps:[],snapCount:0,score:0,story:null,slideIdx:0,storyTimer:null};

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const nowStr=()=>{const d=new Date();return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;};
function initials(n){return n.split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';}
function avatarColor(h){const C=['#FF6B6B','#A78BFA','#34D399','#FF9F0A','#60A5FA','#F472B6','#FBBF24','#38BDF8','#A3E635','#FB923C'];let v=0;for(const c of h)v=(v*31+c.charCodeAt(0))&0xFFFF;return C[v%C.length];}
function makeAv(handle,name,pic,size=50){const s=size+'px',fs=Math.round(size*.35)+'px',col=avatarColor(handle),ini=initials(name);if(pic)return`<div style="width:${s};height:${s};border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="${pic}" style="width:100%;height:100%;object-fit:cover;"></div>`;return`<div style="width:${s};height:${s};border-radius:50%;background:${col}22;color:${col};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:${fs};flex-shrink:0;">${ini}</div>`;}

let _tt;
function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2600);}
function openM(id){$(id).classList.add('on');}
function closeM(id){$(id).classList.remove('on');}
function showErr(msg){const el=$('auth-err');el.textContent=msg;el.style.display='block';}
function hideErr(){$('auth-err').style.display='none';}

let authTab='in';
function switchTab(t){
  authTab=t;
  $('t-in').classList.toggle('on',t==='in');
  $('t-up').classList.toggle('on',t==='up');
  $('f-in').style.display=t==='in'?'flex':'none';
  $('f-up').style.display=t==='up'?'flex':'none';
  $('auth-btn').textContent=t==='in'?'Se connecter':'Créer mon compte';
  hideErr();
}

async function doAuth(){
  hideErr();
  const btn=$('auth-btn');
  btn.disabled=true; btn.textContent='⏳...';
  try{
    if(authTab==='up'){
      const name=$('up-name').value.trim();
      const hdl=$('up-hdl').value.trim().replace(/^@/,'').toLowerCase();
      const pw=$('up-pw').value;
      const pw2=$('up-pw2').value;
      if(!name){showErr('Entre ton nom !');return;}
      if(!hdl){showErr('Entre un @pseudo !');return;}
      if(!/^[a-z0-9_]{2,20}$/.test(hdl)){showErr('Pseudo : lettres minuscules, chiffres, _ (2-20 car.)');return;}
      if(pw.length<4){showErr('Mot de passe trop court (min 4 car.)');return;}
      if(pw!==pw2){showErr('Les mots de passe ne correspondent pas !');return;}
      const existing=await fbGet('accounts/'+hdl);
      if(existing){showErr('@'+hdl+' est déjà pris !');return;}
      await fbSet('accounts/'+hdl,{name,handle:hdl,pwh:hashPw(pw),pic:null,lastSeen:Date.now()});
      doLogin({name,handle:hdl,pic:null});
    } else {
      const hdl=$('in-hdl').value.trim().replace(/^@/,'').toLowerCase();
      const pw=$('in-pw').value;
      if(!hdl){showErr('Entre ton @pseudo !');return;}
      if(!pw){showErr('Entre ton mot de passe !');return;}
      const acc=await fbGet('accounts/'+hdl);
      if(!acc){showErr('Compte @'+hdl+' introuvable');return;}
      const ok=acc.pwh?acc.pwh===hashPw(pw):acc.pw===pw;
      if(!ok){showErr('Mot de passe incorrect');return;}
      doLogin({name:acc.name,handle:hdl,pic:acc.pic||null});
    }
  } finally {
    btn.disabled=false;
    btn.textContent=authTab==='in'?'Se connecter':'Créer mon compte';
  }
}

function doDemo(){doLogin({name:'Démo',handle:'demo_'+Date.now().toString(36),pic:null,demo:true});}

async function doLogin(user){
  ME=user;
  const saved=loadLocal(ME.handle);
  if(saved){MSGS=saved.msgs||{};S.recentSnaps=saved.snaps||[];S.snapCount=saved.snapCount||0;S.score=saved.score||0;if(saved.pic)ME.pic=saved.pic;}
  else{MSGS={};S.recentSnaps=[];S.snapCount=0;S.score=0;}
  $('s-auth').classList.remove('on');
  $('app').style.display='block';
  await refreshUsers();
  go('chat');
}

async function refreshUsers(){
  const all=await fbGet('accounts');
  USERS=all||{};
  if(ME&&!ME.demo) delete USERS[ME.handle];
  renderChats(); renderStories();
  if(S.screen==='prof') refreshProf();
}

function doLogout(){
  saveState();
  ME=null;USERS={};MSGS={};S.recentSnaps=[];S.snapCount=0;S.score=0;S.convoId=null;
  $('app').style.display='none';
  $('s-auth').classList.add('on');
  toast('À bientôt ! 👋');
}

function saveState(){
  if(!ME||ME.demo) return;
  saveLocal(ME.handle,{msgs:MSGS,snaps:S.recentSnaps,snapCount:S.snapCount,score:S.score,pic:ME.pic||null});
  fbPatch('accounts/'+ME.handle,{lastSeen:Date.now(),name:ME.name});
}

function go(screen){
  const prev=S.screen;
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  $('s-'+screen).classList.add('on');
  const nb=$('nb-'+screen);if(nb)nb.classList.add('on');
  S.screen=screen;
  if(screen==='cam') startCam();
  else if(prev==='cam') stopCam();
  if(screen==='prof') refreshProf();
  if(screen==='stories') renderStories();
  if(screen==='disc') renderDiscover();
}

function renderChats(filter){
  filter=(filter||'').toLowerCase();
  const el=$('chat-list');if(!el)return;
  let users=Object.values(USERS);
  if(filter) users=users.filter(u=>u.name.toLowerCase().includes(filter)||u.handle.toLowerCase().includes(filter));
  if(users.length===0){
    $('chat-lbl').textContent='MESSAGES';
    el.innerHTML=`<div class="empty"><div class="ei">💬</div><div class="et">${filter?'Aucun résultat':'Personne encore ici'}</div><div class="es">${filter?'Essaie un autre prénom.':'Tes amis apparaîtront ici dès qu\'ils créent un compte Flash ⚡<br>Appuie sur 🔄 pour actualiser.'}</div></div>`;
    return;
  }
  $('chat-lbl').textContent=`AMIS — ${users.length} personne${users.length>1?'s':''}`;
  el.innerHTML=users.map(u=>{
    const msgs=MSGS[u.handle]||[];
    const last=msgs[msgs.length-1];
    const preview=last?(last.photo?'📷 Photo':last.text):'Dis bonjour 👋';
    const time=last?last.time:'';
    const unread=last&&last.from==='them'&&!last.read;
    const avHTML=makeAv(u.handle,u.name,u.pic||null,52);
    const online=u.lastSeen&&(Date.now()-u.lastSeen<120000);
    const dot=`<div class="av-dot ${online?'on':'off'}" style="position:absolute;bottom:2px;right:2px;"></div>`;
    const avWrap=`<div style="position:relative;flex-shrink:0;">${avHTML}${dot}</div>`;
    return`<div class="ci" onclick="openConvo('${esc(u.handle)}')">
      ${avWrap}
      <div class="ci-info"><div class="ci-name">${esc(u.name)}</div><div class="ci-prev${unread?' u':''}">${esc(preview)}</div></div>
      <div class="ci-meta"><span class="ci-time">${time}</span><div class="nbadge ${unread?'r':'g'}">${unread?'▶':'💬'}</div></div>
    </div>`;
  }).join('');
}
function filterChats(v){renderChats(v);}

function openConvo(handle){
  const u=USERS[handle];if(!u)return;
  S.convoId=handle;
  if(MSGS[handle]) MSGS[handle].forEach(m=>{if(m.from==='them')m.read=true;});
  const avHTML=makeAv(u.handle,u.name,u.pic||null,36);
  $('convo-hdr').innerHTML=`${avHTML}<div style="min-width:0;"><div class="cname" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(u.name)}</div><div class="cstatus">● En ligne</div></div>`;
  renderMsgs(handle); go('convo');
  setTimeout(()=>{const i=$('minp');if(i)i.focus();},300);
}

function renderMsgs(handle){
  const el=$('msgs');if(!el)return;
  const u=USERS[handle];
  const list=MSGS[handle]||[];
  const theirAv=u?makeAv(u.handle,u.name,u.pic||null,26):'';
  let html='<div class="daylbl">Aujourd\'hui</div>';
  list.forEach(m=>{
    if(m.photo){
      const safe=m.photo.replace(/'/g,'%27');
      html+=`<div class="mrow ${m.from}">${m.from==='them'?`<div class="mav">${theirAv}</div>`:''}<img class="bphoto" src="${m.photo}" onclick="openFP('${safe}')"></div><div class="btm ${m.from==='me'?'me':''}">${m.time}</div>`;
    } else {
      html+=`<div class="mrow ${m.from}">${m.from==='them'?`<div class="mav">${theirAv}</div>`:''}<div class="bub ${m.from}">${esc(m.text)}</div></div><div class="btm ${m.from==='me'?'me':''}">${m.time}</div>`;
    }
  });
  el.innerHTML=html;
  requestAnimationFrame(()=>el.scrollTop=el.scrollHeight);
}

function sendMsg(){
  const inp=$('minp');if(!inp)return;
  const text=inp.value.trim();if(!text||!S.convoId)return;
  const hdl=S.convoId,t=nowStr();
  if(!MSGS[hdl])MSGS[hdl]=[];
  MSGS[hdl].push({from:'me',text,time:t,read:true});
  inp.value=''; S.score+=5;
  renderMsgs(hdl);renderChats();saveState();
  autoReply(hdl);
}

const REPLIES=['😂','Hahaha !','Trop drôle 💀','Ok je vois 👀','🔥🔥','Exactement !','Wesh !','💯','Oh non 😭','Trop bien !','Attends 📸','Trop fort !!','Allez 🙌','👀','lol','C\'est chaud 🥶','GG !!','Ah ouais !','😭','Non sérieux ??'];
function autoReply(hdl){
  const delay=900+Math.floor(Math.random()*1100);
  setTimeout(()=>showTyping(hdl),delay-350);
  setTimeout(()=>{hideTyping();const rep=REPLIES[Math.floor(Math.random()*REPLIES.length)];if(!MSGS[hdl])return;MSGS[hdl].push({from:'them',text:rep,time:nowStr(),read:false});if(S.convoId===hdl)renderMsgs(hdl);renderChats();saveState();},delay);
}
function showTyping(hdl){if(S.convoId!==hdl)return;const el=$('msgs');if(!el)return;const u=USERS[hdl];const avHTML=u?makeAv(u.handle,u.name,u.pic||null,26):'';const row=document.createElement('div');row.id='typr';row.className='typing-row';row.innerHTML=`<div class="mav">${avHTML}</div><div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;el.appendChild(row);el.scrollTop=el.scrollHeight;}
function hideTyping(){const e=$('typr');if(e)e.remove();}

function sendPhoto(inp){
  const file=inp.files[0];if(!file||!S.convoId)return;
  const r=new FileReader();
  r.onload=e=>{const hdl=S.convoId;if(!MSGS[hdl])MSGS[hdl]=[];MSGS[hdl].push({from:'me',photo:e.target.result,time:nowStr(),read:true});S.snapCount++;S.score+=15;pushSnap(e.target.result);renderMsgs(hdl);renderChats();saveState();toast('📷 Photo envoyée !');};
  r.readAsDataURL(file);inp.value='';
}

async function startCam(){
  stopCam();const v=$('cvid'),fb=$('cfb');
  try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:S.facing,width:{ideal:1280},height:{ideal:960}},audio:false});S.camStream=stream;v.srcObject=stream;v.style.display='block';fb.style.display='none';}
  catch{v.style.display='none';fb.style.display='flex';}
}
function stopCam(){if(S.camStream){S.camStream.getTracks().forEach(t=>t.stop());S.camStream=null;}const v=$('cvid');if(v){v.srcObject=null;v.style.display='none';}}
function flipCam(){S.facing=S.facing==='environment'?'user':'environment';startCam();toast(S.facing==='user'?'🤳 Frontale':'📷 Arrière');}
function captureSnap(){
  const v=$('cvid'),c=$('ccanv'),fl=$('fov');
  fl.classList.add('flash');setTimeout(()=>fl.classList.remove('flash'),150);
  let data;
  if(v.srcObject&&v.readyState>=2){c.width=v.videoWidth||640;c.height=v.videoHeight||480;const ctx=c.getContext('2d');if(S.facing==='user'){ctx.translate(c.width,0);ctx.scale(-1,1);}ctx.drawImage(v,0,0,c.width,c.height);data=c.toDataURL('image/jpeg',.88);}
  else{data=makeFakeSnap(c);}
  S.capturedPhoto=data;S.snapCount++;S.score+=10;pushSnap(data);showPreview(data);
}
function makeFakeSnap(c){const pals=[['#1a1a2e','#0f3460'],['#0f0c29','#302b63'],['#134e5e','#71b280'],['#fc4a1a','#f7b733']];const emojis=['🌟','🔥','⚡','🎵','💫','🌈'];const[c1,c2]=pals[Math.floor(Math.random()*pals.length)];const em=emojis[Math.floor(Math.random()*emojis.length)];c.width=400;c.height=600;const ctx=c.getContext('2d');const g=ctx.createLinearGradient(0,0,400,600);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.fillRect(0,0,400,600);ctx.font='120px serif';ctx.textAlign='center';ctx.fillText(em,200,320);return c.toDataURL('image/jpeg',.88);}
function showPreview(data){$('prev-wrap').style.display='flex';$('prev-img').src=data;}
function discardPhoto(){$('prev-wrap').style.display='none';S.capturedPhoto=null;}
function setAsProfile(){if(!S.capturedPhoto)return;applyPic(S.capturedPhoto);discardPhoto();toast('📸 Photo de profil !');go('prof');}
function openSendModal(){
  if(!S.capturedPhoto)return;
  $('snap-prev').src=S.capturedPhoto;
  const sl=$('send-list');
  const users=Object.values(USERS);
  sl.innerHTML=users.length===0?'<div style="color:#444;font-size:.82rem;text-align:center;padding:12px">Aucun ami pour l\'instant.</div>':users.map(u=>`<div class="st-item" onclick="sendSnapTo('${esc(u.handle)}')">${makeAv(u.handle,u.name,u.pic||null,38)}<div style="font-weight:700">${esc(u.name)}</div><div style="color:#444;font-size:.78rem;margin-left:auto">@${esc(u.handle)}</div></div>`).join('');
  openM('m-send');
}
function sendSnapTo(handle){const data=S.capturedPhoto;if(!data)return;if(!MSGS[handle])MSGS[handle]=[];MSGS[handle].push({from:'me',photo:data,time:nowStr(),read:true});const u=USERS[handle];closeM('m-send');discardPhoto();renderChats();saveState();toast('Snap envoyé à '+(u?u.name.split(' ')[0]:'ton ami')+' ⚡');}
function gallerySnap(inp){const file=inp.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{S.capturedPhoto=e.target.result;S.snapCount++;S.score+=10;pushSnap(e.target.result);showPreview(e.target.result);};r.readAsDataURL(file);inp.value='';}
function pushSnap(data){S.recentSnaps.unshift(data);if(S.recentSnaps.length>9)S.recentSnaps.pop();}

function applyPic(data){ME.pic=data;pushSnap(data);refreshProf();saveState();}
function changePic(inp){const file=inp.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{applyPic(e.target.result);toast('📸 Photo de profil mise à jour !');};r.readAsDataURL(file);inp.value='';}
function refreshProf(){
  if(!ME)return;
  $('p-hdl-top').textContent='@'+ME.handle;
  $('p-name').textContent=ME.name;
  $('p-hdl').textContent='@'+ME.handle;
  $('s-snaps').textContent=S.snapCount;
  $('s-friends').textContent=Object.keys(USERS).length;
  $('s-views').textContent=S.snapCount*14+Object.keys(USERS).length*80;
  $('s-score').textContent=S.score.toLocaleString('fr');
  $('s-rank').textContent=S.score>5000?'Top 5% 🏆':S.score>1000?'Top 20% ⭐':'';
  const wrap=$('pav'),initEl=$('p-init');
  const old=wrap.querySelector('img');if(old)old.remove();
  if(ME.pic){initEl.style.display='none';const img=document.createElement('img');img.src=ME.pic;img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;';wrap.style.background='#111';wrap.appendChild(img);}
  else{initEl.style.display='';initEl.textContent=initials(ME.name);wrap.style.background=avatarColor(ME.handle)+'33';initEl.style.color=avatarColor(ME.handle);}
  renderGrid();
}
function renderGrid(){
  const el=$('pgrid');if(!el)return;
  const fb=['🌅','🎮','🎵','🏃','🍕','🌊','🎨','🌙','⚡'];
  const bgs=['#1a1a2e','#0f0c29','#134e5e','#2d1b69','#1c1c1c','#0a0a0a','#2c3e50','#1a0a2e','#0f1a1c'];
  let html='';
  for(let i=0;i<9;i++){if(S.recentSnaps[i]){const s=S.recentSnaps[i].replace(/'/g,'%27');html+=`<div class="pgc" onclick="openFP('${s}')"><img src="${S.recentSnaps[i]}" loading="lazy"></div>`;}else{html+=`<div class="pgc" style="background:${bgs[i]}">${fb[i]}</div>`;}}
  el.innerHTML=html;
}
function openEditModal(){$('e-name').value=ME.name;openM('m-edit');setTimeout(()=>$('e-name').focus(),200);}
function saveEdit(){const n=$('e-name').value.trim();if(!n){toast('⚠️ Remplis le nom !');return;}ME.name=n;closeM('m-edit');refreshProf();saveState();toast('Profil mis à jour ✅');}
function shareProfile(){const url='https://lulump5.github.io/Flashchat/';if(navigator.share){navigator.share({title:'Flash ⚡',text:`Rejoins-moi ! Mon pseudo : @${ME.handle}`,url});}else{navigator.clipboard&&navigator.clipboard.writeText(url).then(()=>toast('🔗 Lien copié !'));;}}

const STORY_BKGS=['linear-gradient(135deg,#1a1a2e,#e94057)','linear-gradient(135deg,#0f0c29,#302b63)','linear-gradient(135deg,#134e5e,#71b280)','linear-gradient(135deg,#fc4a1a,#f7b733)','linear-gradient(135deg,#2d1b69,#11998e)'];
const STORY_EMOJIS=['🌅','🎮','🏔️','🎵','🌿','🌮','🎨','🌊','⚡','🎪'];
const STORY_TEXTS=['Moment parfait ✨','Gaming night 🎮','Randonnée épique !','Ce son est 🔥','Nature 📷','Trop bon 😍','Nouvelle créa 🎨','Belle journée 🌊','Flash forever ⚡','Soirée folle 🎪'];

function renderStories(){
  const el=$('stlist');if(!el)return;
  const users=Object.values(USERS);
  if(users.length===0){el.innerHTML=`<div class="empty"><div class="ei">📖</div><div class="et">Aucune story</div><div class="es">Les stories de tes amis apparaîtront ici.</div></div>`;$('cstrip').innerHTML='';return;}
  el.innerHTML=users.slice(0,8).map((u,i)=>{const em=STORY_EMOJIS[i%STORY_EMOJIS.length];const ri=u.pic?`<div class="slri"><img src="${u.pic}"></div>`:`<div class="slri" style="background:${avatarColor(u.handle)}20;color:${avatarColor(u.handle)}">${initials(u.name)}</div>`;return`<div class="sli" onclick="openStory('${esc(u.handle)}',${i})"><div class="slring">${ri}</div><div><div class="sl-n">${esc(u.name)}</div><div class="sl-t">Il y a ${(i+1)*8}min · ${i+1} snap${i>0?'s':''}</div></div><div class="sl-em">${em}</div></div>`;}).join('');
  $('cstrip').innerHTML=users.slice(0,5).map((u,i)=>{const ri=u.pic?`<div class="sri"><img src="${u.pic}"></div>`:`<div class="sri" style="background:${avatarColor(u.handle)}20;color:${avatarColor(u.handle)}">${initials(u.name)}</div>`;return`<div class="sthumb" onclick="openStory('${esc(u.handle)}',${i})"><div class="sring">${ri}</div><span class="stn">${u.name.split(' ')[0]}</span></div>`;}).join('');
}
function openStory(handle,idx){const u=USERS[handle];if(!u)return;const slides=(idx%3)+1;S.story={u,slides,idx};S.slideIdx=0;$('sv-prog').innerHTML=Array.from({length:slides},(_,i)=>`<div class="sv-seg"><div class="sv-fill" id="sf-${i}"></div></div>`).join('');const hav=u.pic?`<div class="sv-hav"><img src="${u.pic}"></div>`:`<div class="sv-hav" style="background:${avatarColor(u.handle)}20;color:${avatarColor(u.handle)}">${initials(u.name)}</div>`;$('sv-hdr').innerHTML=`${hav}<span class="sv-hn">${esc(u.name)}</span><span class="sv-ht">Il y a ${(idx+1)*8}min</span><button class="sv-close" onclick="closeStory()">✕</button>`;showSlide(0);$('sv').classList.add('on');}
function showSlide(idx){S.slideIdx=idx;if(S.storyTimer)clearTimeout(S.storyTimer);const{slides,idx:si}=S.story;for(let i=0;i<slides;i++){const f=$(`sf-${i}`);if(f){f.style.transition='none';f.style.width=i<idx?'100%':'0%';}}const cur=$(`sf-${idx}`);if(cur)requestAnimationFrame(()=>{cur.style.transition='width 4s linear';cur.style.width='100%';});const bg=STORY_BKGS[(idx+si)%STORY_BKGS.length];const em=STORY_EMOJIS[(idx+si)%STORY_EMOJIS.length];const txt=STORY_TEXTS[(idx+si)%STORY_TEXTS.length];$('sv-cnt').innerHTML=`<div class="sv-bg" style="background:${bg}"></div><div class="sv-txt"><div class="sv-e">${em}</div><div class="sv-t">${txt}</div></div>`;S.storyTimer=setTimeout(nextSlide,4000);}
function nextSlide(){if(!S.story)return;const n=S.slideIdx+1;if(n<S.story.slides)showSlide(n);else closeStory();}
function closeStory(){if(S.storyTimer)clearTimeout(S.storyTimer);$('sv').classList.remove('on');S.story=null;}

const SPOTS=[{emoji:'🏄',bg:'linear-gradient(135deg,#1a1a2e,#4a90d9)',auth:'@surfdude',cap:'Session de folie !',v:'42k',l:'8.2k'},{emoji:'🎨',bg:'linear-gradient(135deg,#2d1b69,#e94057)',auth:'@artvibes',cap:'Nouvelle œuvre 🎨',v:'18k',l:'3.1k'},{emoji:'🌆',bg:'linear-gradient(135deg,#0f0c29,#302b63)',auth:'@citypics',cap:'Paris de nuit ✨',v:'95k',l:'21k'},{emoji:'🎵',bg:'linear-gradient(135deg,#fc4a1a,#f7b733)',auth:'@musiclvr',cap:'Beat du jour 🎵',v:'31k',l:'6.8k'},{emoji:'🍜',bg:'linear-gradient(135deg,#134e5e,#71b280)',auth:'@foodieX',cap:'Ramen maison 🍜',v:'12k',l:'2.4k'},{emoji:'💃',bg:'linear-gradient(135deg,#c94b4b,#4b134f)',auth:'@dancer99',cap:'Chorée terminée !',v:'78k',l:'15k'}];
function renderDiscover(){const cats=['🔥 Trending','🎵 Musique','🏀 Sport','😂 Humour','🌍 Voyage','🍕 Food'];$('cats').innerHTML=cats.map((c,i)=>`<button class="cpill${i===0?' on':''}" onclick="pickCat(this)">${c}</button>`).join('');$('sgrid').innerHTML=SPOTS.map(s=>`<div class="si" onclick="toast('▶ ${esc(s.cap)}')"><div class="si-bg" style="background:${s.bg}">${s.emoji}</div><div class="si-ov"></div><div class="si-info"><div class="si-auth">${s.auth}</div><div class="si-cap">${s.cap}</div><div class="si-stats"><span class="si-stat">👁 ${s.v}</span><span class="si-stat">❤️ ${s.l}</span></div></div></div>`).join('');}
function pickCat(el){document.querySelectorAll('.cpill').forEach(b=>b.classList.remove('on'));el.classList.add('on');toast(el.textContent);}

function openFP(src){$('fp-img').src=src;$('fp').classList.add('on');}
function closeFP(){$('fp').classList.remove('on');}

document.addEventListener('keydown',e=>{if(e.key==='Enter'){const mi=$('minp');if(mi&&document.activeElement===mi){e.preventDefault();sendMsg();return;}}if(e.key==='Escape'){closeFP();closeStory();}});
document.getElementById('sbtn').addEventListener('click',e=>{e.preventDefault();sendMsg();});

// Auto-refresh toutes les 30s pour voir les nouveaux inscrits
setInterval(()=>{if(ME&&!ME.demo)refreshUsers();},30000);
</script>
